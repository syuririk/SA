# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Study Assistant — 설정
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

paths:
  root: "/content/drive/MyDrive/Syuririk/100 For Agent"
  pdf: "{root}/PDFs"
  ocr: "{root}/OCR"
  vault: "{root}/Vault"

book:
  index: 0

ocr:
  model: "mistral-ocr-latest"
  batch_size: 50
  max_concurrent: 3

chunking:
  mode: "auto"
  model:
    model: "gpt-4.1-mini"
    temperature: 0.2
  manual_chunks: []

pipeline:
  summary:
    model: "gpt-5-mini"
  quiz_extract:
    model: "gpt-5-mini"
  quiz_create:
    model: "gpt-5-mini"
  max_retries: 3
  retry_delay: 5
  max_concurrent: 10

quiz_generator:
  model:
    model: "gpt-5-mini"
  n: 5
  quiz_type: "multiple_choice"
  source: "random"
  difficulty: "medium"

# 📐 Graph RAG
graph_rag:
  model:
    model: "gpt-5-mini"
  max_concurrent: 10   # 파일당 동시 LLM 호출 수