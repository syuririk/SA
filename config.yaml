paths:
  drive_base: "/content/drive/MyDrive/Syuririk/001 Project/200 Open Ai Api /study_data"
  input_dir: "/content/drive/MyDrive/Syuririk/001 Project/200 Open Ai Api /study_data"
  output_dir: "/content/drive/MyDrive/Syuririk/001 Project/200 Open Ai Api /study_data"

book:
  index: 0

ocr:
  model: "mistral-ocr-latest"
  batch_size: 50
  max_concurrent: 3

chunking:
  mode: "auto"
  model:
    model: "gpt-4.1-nano"
    temperature: 0.2
  manual_chunks: []

pipeline:
  summary:
    model: "gpt-5-mini"
  quiz_extract:
    model: "gpt-5-mini"
  quiz_create:
    model: "gpt-5-mini"
  max_retries: 3
  retry_delay: 5
  max_concurrent: 5

quiz_generator:
  model:
    model: "gpt-5-mini"
  n: 5
  quiz_type: "multiple_choice" # multiple_choice / ox / short_answer / fill_in_blank
  source: "random" # summary / quiz / random
  difficulty: "medium" # easy / medium / hard